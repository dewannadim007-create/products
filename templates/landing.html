<!DOCTYPE html>
<html>
<head>
    <title>Landing Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f2f2f2;
        }

        .header {
            background: #4CAF50;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 28px;
        }

        .container {
            max-width: 600px;
            margin: 60px auto;
            background: #eaeaea;
            padding: 40px;
            border-radius: 6px;
            text-align: center;
        }

        h2 {
            color: #4CAF50;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        .options {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            text-decoration: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            flex: 1;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="header">Product Management</div>

<div class="container">
    <h2>Welcome</h2>
    <p>Select an option to continue.</p>

    <div class="options">
        <a href="{% url 'approved_products' %}" class="btn">View Approved Products</a>
        <a href="{% url 'draft_upload' %}" class="btn">Draft & Upload</a>
    </div>
</div>

</body>
</html>
